name: airtable-company-research
display_name: Airtable Company Research
description: >-
  When a new account lands in your Airtable tracker, the agent
  researches the tech stack, recent funding, and key contacts —
  then posts a sourced dossier to whichever Slack channel the
  bot has been invited to. @mention it any time for a
  follow-up.
category: sales

story:
  hero: "New account in Airtable → sourced dossier in Slack, in five minutes."
  subheadline: >-
    When a new account lands in your tracker, it researches the
    tech stack, recent funding, and key contacts — then posts
    the dossier to your team.
  steps:
    - role: trigger
      title: "A new account lands in Airtable."
      body: >-
        The heartbeat fires every 5 minutes and detects rows
        added to your Accounts table since the last sweep — no
        manual handoff.
    - role: action
      title: "It researches the company and key contacts."
      body: >-
        Runs a focused Parallel deep-research pass for the
        tech stack, recent funding, and the people who matter,
        with a source URL for every claim.
      catalog: parallel-search-mcp
    - role: outcome
      title: "A sourced dossier, posted where you invited it."
      body: >-
        A compact, cited briefing in Slack — under 2,000
        characters, three lines per section, with a link back
        to the Airtable record.
      catalog: slack

connectors:
  - catalog: airtable-mcp
    description: >-
      The Airtable MCP server, OAuth-authenticated. The agent
      reads the Accounts table to detect new rows and answer
      ad-hoc questions, and writes back to records only when a
      Slack user explicitly confirms.
    ui:
      headline: "Connect Airtable with one click."
      blurb: >-
        OAuth into Airtable — no API token to paste. The agent
        uses your workspace permissions to read your Accounts
        table and (on confirmation) update rows.
      done_note: "Airtable connected"

  - catalog: parallel-search-mcp
    description: >-
      Parallel's deep-research search MCP. The agent uses it to
      look up tech stack signals, funding history, and key
      contacts for each new account, with source URLs returned
      alongside every result. Keyless — no token required.
    ui:
      headline: "Add Parallel deep research."
      blurb: >-
        One-click connector for Parallel's search MCP — no API
        key to manage. Powers the sourced dossiers the agent
        posts when a new account lands.
      done_note: "Parallel ready"

channels:
  - catalog: slack
    description: >-
      The agent gets its own Slack bot. Invite it to whichever
      channels you want new-account dossiers in, and to any
      other channel where teammates should be able to @mention
      it for ad-hoc company research.
    ui:
      headline: "Give Company Research a Slack bot."
      blurb: >-
        The agent posts each new-account dossier to every
        channel you invite it to. Invite it to one focused
        sales channel, or several — whatever matches how your
        team works.
      done_note: "Bot ready — invite it to a channel"

  - type: heartbeat
    every: 5m
    description: "Sweeps the Airtable Accounts table every 5 minutes for newly-added rows to research."
